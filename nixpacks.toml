# Nixpacks configuration for Render
# This file installs system dependencies like Tesseract OCR

[phases.setup]
nixPkgs = ["...", "tesseract", "libtesseract", "pkg-config"]

[phases.install]
cmds = ["pip install -r requirements.txt", "npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "gunicorn backend.app:app"
